<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup">
    <div class="popup-header">
      <span class="logo">Obsidian Clipper</span>
      <a href="#" id="openOptions" class="settings-link" data-i18n-title="popup.settings" title="Settings">⚙</a>
    </div>

    <div id="status" class="status" style="display:none"></div>

    <div id="mainView">
      <div class="field">
        <label data-i18n="popup.selectProfile">Select Profile</label>
        <select id="profileSelect"></select>
      </div>
      <div id="previewSection" style="display:none">
        <div class="field">
          <label data-i18n="popup.previewVars">Preview Variables</label>
          <div id="varPreview" class="var-preview"></div>
        </div>
        <div class="field">
          <label data-i18n="popup.savePath">Save Path</label>
          <div id="pathPreview" class="path-preview"></div>
        </div>
      </div>
      <div class="actions">
        <button class="btn-primary full-width" id="extractBtn" disabled data-i18n="popup.extractBtn">Extract & Save</button>
      </div>
    </div>

    <div id="emptyView" style="display:none">
      <p class="empty-text" data-i18n="popup.emptyText">No Profiles configured yet. Please create one in Settings.</p>
      <button class="btn-primary full-width" id="goOptions" data-i18n="popup.openSettings">Open Settings</button>
    </div>
  </div>

  <script src="i18n.js"></script>
  <script src="popup.js"></script>
</body>
</html>
