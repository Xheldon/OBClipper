<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup">
    <div class="popup-header">
      <span class="logo">Obsidian Clipper</span>
      <a href="#" id="openOptions" class="settings-link" title="设置">⚙</a>
    </div>

    <div id="status" class="status" style="display:none"></div>

    <div id="mainView">
      <div class="field">
        <label>选择 Profile</label>
        <select id="profileSelect"></select>
      </div>
      <div id="previewSection" style="display:none">
        <div class="field">
          <label>预览变量</label>
          <div id="varPreview" class="var-preview"></div>
        </div>
        <div class="field">
          <label>保存路径</label>
          <div id="pathPreview" class="path-preview"></div>
        </div>
      </div>
      <div class="actions">
        <button class="btn-primary full-width" id="extractBtn" disabled>提取并保存</button>
      </div>
    </div>

    <div id="emptyView" style="display:none">
      <p class="empty-text">还没有配置 Profile，请先去设置页面创建。</p>
      <button class="btn-primary full-width" id="goOptions">打开设置</button>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
